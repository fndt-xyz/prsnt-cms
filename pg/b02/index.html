<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Gate | B02</title>
    <script>
    const authType = "B02_KEY"; // Change this per folder
	
		async function checkAccess() {
			const hostname = window.location.hostname;
			const isLocal = hostname === 'localhost' || hostname === '127.0.0.1' || hostname.startsWith('192.168.');
	
			// 1. Authorization bypass
			if (isLocal || document.cookie.includes("b_access=granted")) {
				return grantAccess();
			}
	
			// 2. Password Prompt
			const password = prompt(`Please enter password for ${authType}:`);
			if (!password) { window.location.href = "/"; return; }
	
			try {
				const resp = await fetch('/api/verify', {
					method: 'POST',
					body: JSON.stringify({ lookupKey: authType, code: password }),
					headers: { 'Content-Type': 'application/json' }
				});
				const data = await resp.json();
				if (resp.ok && data.granted) {
					grantAccess();
				} else {
					alert("Wrong password.");
					window.location.href = "/";
				}
			} catch (e) { alert("System Error."); }
		}
	
		function grantAccess() {
			// 1. Set credentials
			document.cookie = "b_access=granted; path=/; samesite=strict; secure";
			sessionStorage.setItem('b_access', 'granted');
	
			const currentUrl = window.location.href;
			const path = window.location.pathname;
	
			// 2. Identify if we are at the folder level (index)
			const isAtGate = path.endsWith('/') || path.includes('index.html') || !path.includes('.');
	
			if (isAtGate) {
				/**
				* THE FIX: Universal Relative Redirect
				* 1. If URL is .../p01 (no slash), we add /page-00-00-title.html
				* 2. If URL is .../p01/ or index.html, we use ./page-00-00-title.html
				* This works on BOTH Localhost and Vercel automatically.
				*/
				const redirectUrl = (path.endsWith('/') || path.includes('index.html')) 
									? "./page-00-00-title.html" 
									: `${currentUrl.split('?')[0]}/page-00-00-title.html`;
	
				console.log("Redirecting to:", redirectUrl);
				window.location.replace(redirectUrl);
			} else {
				// If already on a specific file, stay there.
				window.location.reload();
			}
		}
	
		window.onload = checkAccess;
</script>
</head>
<body style="background:#0a0a0a; color:#444; font-family:monospace; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div style="text-align:center;"><p>VERIFYING...</p></div>
</body>
</html>
