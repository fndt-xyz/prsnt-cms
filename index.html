<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prsnt-cms | home</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="code/element.css">
    <script src="code/herond.ctrl.js"></script>
    <script src="code/barnd.ctrl.js"></script>
</head>
<body class="antialiased">

    <div id="navbar-placeholder"></div>

    <main class="view-container">
        <div class="grid-two-one">
            
            <div class="left-col">
                <section class="view-card">
                    <h1 class="view-title">publications</h1>
                    <div class="view-content">
						<p>
							<a href="https://github.com" target="_blank" rel="noopener noreferrer" style="font-weight: 400;">prsnt-cms</a> has restricted access, functioning as gateway for technical presentations and project previews. engineered using pure html, css and javascript.
						</p>
                      
							<div class="my-6 border border-slate-100 rounded-lg overflow-hidden">
                            </div>
                    </div>
                </section>
                
                <section class="view-card">
                    <div id="hero-placeholder"></div>
                    <div id="row-placeholder"></div>
                    <div id="carousel-placeholder"></div>
                </section>
            </div>

            <div class="right-col">
                <div id="sidebar-placeholder">
                    </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // A robust loader that returns a promise
        async function loadComponent(id, file) {
            const element = document.getElementById(id);
            if (!element) return false;
            
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Failed to load ${file}`);
                const data = await response.text();
                element.innerHTML = data;
                return true; 
            } catch (error) {
                console.error("Component Error:", error);
                return false;
            }
        }

        // The "Timing" Logic
			document.addEventListener("DOMContentLoaded", async () => {
            // 1. Load static parts (non-blocking)
            loadComponent('navbar-placeholder', 'navbar.html');
            loadComponent('footer-placeholder', 'footer.html');
            loadComponent('sidebar-placeholder', 'rght-clmn.html');

            // 2. Load the Hero Slider (Sequential)
            const heroIsReady = await loadComponent('hero-placeholder', 'code/herond.html');
            if (heroIsReady && typeof initHeroSlider === 'function') {
                initHeroSlider();
            }
            
            // 3. Load the Custom Triple Row (Added await for safety)
            await loadComponent('row-placeholder', 'code/row01.html');
            
            // 4. Load the Barnd Carousel (Sequential)
            const barndIsReady = await loadComponent('carousel-placeholder', 'code/barnd.html');
            if (barndIsReady && typeof initBarndCarousel === 'function') {
                initBarndCarousel();
            }
        });
    </script>
</body>
</html>
